<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkHub | Agregador Pro</title>
    <link rel="icon" type="image/x-icon" href="https://github.com/vmacagnani/api-pre-os/raw/main/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-mesh {
            background-color: #f8fafc;
            background-image: radial-gradient(at 0% 0%, hsla(225,39%,30%,0.03) 0, transparent 50%), 
                              radial-gradient(at 50% 0%, hsla(225,39%,30%,0.03) 0, transparent 50%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .loader-spin {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4f46e5;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #loader-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.8);
            z-index: 10000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(2px);
        }
    </style>
</head>
<body class="bg-mesh min-h-screen text-slate-800 pb-20">

    <div id="loader-overlay">
        <div class="loader-spin"></div>
        <p class="mt-4 text-[10px] font-bold text-indigo-600 animate-pulse uppercase tracking-widest">Sincronizando Link...</p>
    </div>

    <div class="container mx-auto max-w-5xl p-6">
        
        <header class="text-center mt-12 mb-16">
            <img src="https://raw.githubusercontent.com/avatek-m2m/apps-avatek/refs/heads/main/logo-avatek-azul-laranja.png" alt="Logo" class="mx-auto h-12 w-auto mb-6">
            <h1 class="text-3xl font-black italic tracking-tighter text-slate-900 uppercase">Link<span class="text-indigo-600">Hub</span></h1>
            <p class="text-slate-400 text-sm font-medium italic mt-2 tracking-wide">Plataforma central de recursos e acessos. Versão usuários Avatek!</p>
        </header>

        <div class="glass-card p-8 rounded-[2.5rem] shadow-sm mb-16 max-w-2xl mx-auto transition-all hover:shadow-md">
            <h2 class="text-[10px] font-black text-indigo-600 uppercase tracking-[0.2em] mb-6 text-center">Adicionar Novo Recurso</h2>
            <form id="add-link-form" class="space-y-5">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="flex flex-col gap-1">
                        <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">Título do Link</label>
                        <input type="text" id="link-title" name="title" placeholder="Ex: Painel de Controle" required 
                               class="bg-slate-50 p-3 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 text-sm border-none transition-all">
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">URL (Endereço)</label>
                        <input type="url" id="link-url" name="url" placeholder="https://..." required 
                               class="bg-slate-50 p-3 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 text-sm border-none transition-all">
                    </div>
                </div>
                <button type="submit" id="submit-button" class="w-full bg-indigo-600 text-white font-bold py-3.5 rounded-xl hover:bg-indigo-700 shadow-xl shadow-indigo-100 transition-all uppercase tracking-widest text-xs">
                    Salvar na Base de Dados
                </button>
            </form>
        </div>

        <div class="relative">
            <div class="flex justify-between items-center mb-8 border-b border-slate-200 pb-4">
                <h2 class="text-sm font-black text-slate-800 uppercase tracking-widest italic">Recursos Catalogados</h2>
                <button id="reload-button" class="p-2 hover:bg-white rounded-xl transition-all text-slate-400 hover:text-indigo-600 shadow-sm border border-transparent hover:border-slate-100">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M21 2v6h-6"></path>
                        <path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path>
                        <path d="M3 22v-6h6"></path>
                        <path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path>
                    </svg>
                </button>
            </div>
            
            <div id="loader" class="text-center py-20">
                <div class="loader-spin mx-auto"></div>
                <p class="mt-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Acessando Nuvem...</p>
            </div>

            <div id="links-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6">
                </div>

            <div id="empty-state" class="hidden text-center py-20 glass-card rounded-[2.5rem]">
                <p class="text-slate-400 font-bold italic">Nenhum link encontrado.</p>
                <p class="text-[10px] text-slate-300 uppercase mt-2 font-black tracking-widest">Use o formulário para adicionar.</p>
            </div>
        </div>

    </div>

    <script>
        const googleSheetWebAppUrl = 'https://script.google.com/macros/s/AKfycbwV6p-G2Fwyh9McAq-a_ciCEpD4GhJZq1Tqe9X1YNeUdvEHNlirEGaNv-eXWV7vfnqp/exec';

        const form = document.getElementById('add-link-form');
        const linksContainer = document.getElementById('links-container');
        const loader = document.getElementById('loader');
        const overlay = document.getElementById('loader-overlay');
        const emptyState = document.getElementById('empty-state');
        const submitButton = document.getElementById('submit-button');
        const reloadButton = document.getElementById('reload-button');

        function toggleOverlay(show) { overlay.style.display = show ? 'flex' : 'none'; }

        function renderLinks(links) {
            linksContainer.innerHTML = '';
            if (!links || links.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                links.reverse().forEach(link => {
                    const linkCard = `
                        <a href="${link.url}" target="_blank" rel="noopener noreferrer" 
                           class="group glass-card flex flex-col items-center justify-center p-6 rounded-[2rem] hover:shadow-[0_20px_40px_rgba(79,70,229,0.1)] hover:border-indigo-300 transition-all duration-300 aspect-square">
                            <div class="w-14 h-14 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center mb-4 group-hover:bg-indigo-600 group-hover:text-white transition-all duration-300">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
                                </svg>
                            </div>
                            <h3 class="font-bold text-[11px] text-slate-800 uppercase tracking-tighter text-center leading-tight break-words w-full">${link.titulo}</h3>
                        </a>
                    `;
                    linksContainer.insertAdjacentHTML('beforeend', linkCard);
                });
            }
        }

        async function fetchLinks() {
            loader.classList.remove('hidden');
            linksContainer.innerHTML = '';
            emptyState.classList.add('hidden');

            try {
                const response = await fetch(`${googleSheetWebAppUrl}?cache_bust=${new Date().getTime()}`);
                const data = await response.json();
                renderLinks(data.links);
            } catch (error) {
                console.error('Erro:', error);
                linksContainer.innerHTML = '<p class="text-center text-red-500 font-bold uppercase text-[10px]">Falha na Sincronização.</p>';
            } finally {
                loader.classList.add('hidden');
            }
        }

        async function addLink(event) {
            event.preventDefault();
            toggleOverlay(true);
            const formData = new FormData(form);

            try {
                await fetch(googleSheetWebAppUrl, { method: 'POST', body: formData });
                // Devido ao comportamento do Apps Script, assumimos sucesso no POST
                form.reset();
                await fetchLinks();
            } catch (error) {
                // Tratamento silencioso de erros de CORS comuns em POST do Apps Script
                form.reset();
                await fetchLinks();
            } finally {
                toggleOverlay(false);
            }
        }

        document.addEventListener('DOMContentLoaded', fetchLinks);
        form.addEventListener('submit', addLink);
        reloadButton.addEventListener('click', fetchLinks);
    </script>
</body>
</html>
